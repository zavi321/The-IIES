<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Library — The Iqra Islamic Educational System (IIES)</title>
<meta name="description" content="Browse and download textbooks, Islamiyat material, and study guides from The Iqra Islamic Educational System's digital library.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Work+Sans:wght@300;400;500;600;700&family=Noto+Nastaliq+Urdu:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#10193F;
    --royal:#1B2C6B;
    --gold:#C9A227;
    --paper:#FAF6ED;
    --ink:#1E2430;
    --mist:#5B6478;
    --line: rgba(16,25,63,0.12);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:'Work Sans',sans-serif; background:var(--paper); color:var(--ink);
  }
  body[dir="rtl"]{font-family:'Noto Nastaliq Urdu','Work Sans',sans-serif;}

  header{
    background:var(--navy); color:var(--paper); padding:64px 20px 26px; text-align:center;
    position:relative; overflow:hidden;
  }
  header::before{
    content:''; position:absolute; inset:0;
    background:
      radial-gradient(circle at 12% 20%, rgba(201,162,39,0.10) 0, transparent 45%),
      radial-gradient(circle at 88% 80%, rgba(201,162,39,0.08) 0, transparent 45%);
    pointer-events:none;
  }
  header .header-inner{ position:relative; }
  header h1{font-family:'Amiri', serif; font-size:clamp(22px,4vw,30px); margin:0 0 6px;}
  header p{margin:0; color:var(--gold); font-size:13px; letter-spacing:.1em; text-transform:uppercase;}
  .back-link{
    position:absolute; left:20px; top:20px; color:var(--paper); text-decoration:none;
    font-size:13.5px; border:1px solid rgba(250,246,237,0.35); padding:7px 16px; border-radius:20px;
    display:inline-flex; align-items:center; gap:6px; z-index:2;
  }
  body[dir="rtl"] .back-link{left:auto; right:20px;}
  .lang-toggle{
    position:absolute; right:20px; top:20px; background:var(--gold); color:var(--navy);
    border:none; padding:7px 16px; border-radius:20px; font-weight:700; font-size:12.5px; cursor:pointer;
    z-index:2;
  }
  body[dir="rtl"] .lang-toggle{right:auto; left:20px;}

  main{max-width:1100px; margin:0 auto; padding:34px 20px 60px;}

  .toolbar{
    display:flex; gap:12px; flex-wrap:wrap; align-items:center; justify-content:space-between;
    margin-bottom:28px; position:sticky; top:0; background:var(--paper); padding:12px 0; z-index:5;
  }
  #search{
    flex:1; min-width:200px; padding:12px 16px; border:1px solid var(--line); border-radius:10px;
    font-size:14px; font-family:inherit; background:#fff;
  }
  #search:focus{ outline:none; border-color:var(--gold); }
  #classFilter{
    padding:12px 16px; border:1px solid var(--line); border-radius:10px; font-size:14px;
    font-family:inherit; background:#fff; min-width:150px;
  }

  .book-count{
    font-size:12.5px; color:var(--mist); margin-bottom:18px; letter-spacing:.02em;
  }

  .books-grid{
    display:grid; grid-template-columns:repeat(auto-fit, minmax(220px,1fr)); gap:20px;
  }
  .book-card{
    background:#fff; border:1px solid var(--line); border-radius:14px;
    padding:0; text-align:center;
    box-shadow:0 1px 4px rgba(16,25,63,0.06); transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    overflow:hidden;
  }
  .book-card:hover{transform:translateY(-5px); box-shadow:0 12px 26px rgba(16,25,63,0.14); border-color:var(--gold);}
  .book-cover{
    background:linear-gradient(135deg, var(--navy), var(--royal));
    padding:30px 20px 22px; position:relative;
  }
  .book-cover::after{
    content:''; position:absolute; bottom:0; left:0; right:0; height:4px;
    background:linear-gradient(90deg, var(--gold), transparent 70%);
  }
  .book-icon{font-size:38px; filter:drop-shadow(0 3px 6px rgba(0,0,0,0.25));}
  .book-body{ padding:18px 16px 20px; }
  .book-class-tag{
    display:inline-block; font-size:10.5px; font-weight:700; letter-spacing:.05em; text-transform:uppercase;
    color:var(--gold); background:rgba(201,162,39,0.12); padding:3px 10px; border-radius:20px; margin-bottom:10px;
  }
  .book-title{font-weight:700; color:var(--navy); font-size:15.5px; line-height:1.4; margin-bottom:14px;}
  .book-actions{
    display:flex; gap:8px; border-top:1px solid var(--line); padding-top:14px;
  }
  .book-action-btn{
    flex:1; display:flex; align-items:center; justify-content:center; gap:6px;
    padding:9px 8px; border-radius:8px; text-decoration:none;
    font-size:12px; font-weight:700; letter-spacing:.02em;
    border:1px solid var(--line); transition:background .15s ease, border-color .15s ease;
  }
  .book-action-btn.read{
    color:var(--navy); background:var(--paper);
  }
  .book-action-btn.read:hover{ border-color:var(--navy); }
  .book-action-btn.download{
    color:#fff; background:var(--navy); border-color:var(--navy);
  }
  .book-action-btn.download:hover{ background:var(--royal); }

  .empty-state{
    text-align:center; padding:70px 20px; color:var(--mist);
  }
  .empty-state .icon{ font-size:44px; margin-bottom:14px; opacity:.6; }
  .empty-state .title{ font-weight:700; color:var(--navy); font-size:16px; margin-bottom:6px; }
  .empty-state .sub{ font-size:13.5px; }
</style>
</head>
<body id="pageBody">

<header>
  <a class="back-link" href="index.html#library" id="backLink">← Back</a>
  <button class="lang-toggle" id="langToggle">اردو</button>
  <div class="header-inner">
    <h1 id="pageTitle">Digital Library</h1>
    <p id="pageSub">The Iqra Islamic Educational System</p>
  </div>
</header>

<main>
  <div class="toolbar">
    <input type="text" id="search" placeholder="Search books...">
    <select id="classFilter">
      <option value="">All Classes</option>
    </select>
  </div>

  <div class="book-count" id="bookCount"></div>

  <div class="books-grid" id="booksGrid"></div>
  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="icon">📚</div>
    <div class="title" id="emptyTitle">More books coming soon</div>
    <div class="sub" id="emptySub">Check back later — new material is added regularly.</div>
  </div>
</main>

<script>
  let books = [];
  let lang = localStorage.getItem('iies-lang') || 'en';

  const grid = document.getElementById('booksGrid');
  const search = document.getElementById('search');
  const classFilter = document.getElementById('classFilter');
  const emptyState = document.getElementById('emptyState');
  const bookCount = document.getElementById('bookCount');

  const i18nText = {
    en: { title:"Digital Library", sub:"The Iqra Islamic Educational System", back:"← Back", search:"Search books...", all:"All Classes", emptyTitle:"More books coming soon", emptySub:"Check back later — new material is added regularly.", noResultsTitle:"No books found", noResultsSub:"Try a different search or class filter.", read:"Read", download:"Download", countOne:"1 book available", countMany:" books available" },
    ur: { title:"ڈیجیٹل لائبریری", sub:"دی اقرا اسلامک ایجوکیشنل سسٹم", back:"← واپس", search:"کتابیں تلاش کریں...", all:"تمام جماعتیں", emptyTitle:"جلد مزید کتابیں شامل ہوں گی", emptySub:"براہ کرم بعد میں دوبارہ ملاحظہ کریں۔", noResultsTitle:"کوئی کتاب نہیں ملی", noResultsSub:"مختلف الفاظ یا جماعت سے تلاش کریں۔", read:"پڑھیں", download:"ڈاؤن لوڈ", countOne:"1 کتاب دستیاب ہے", countMany:" کتابیں دستیاب ہیں" }
  };

  function applyLang(){
    document.getElementById('pageBody').dir = lang === 'ur' ? 'rtl' : 'ltr';
    document.getElementById('pageTitle').textContent = i18nText[lang].title;
    document.getElementById('pageSub').textContent = i18nText[lang].sub;
    document.getElementById('backLink').textContent = i18nText[lang].back;
    search.placeholder = i18nText[lang].search;
    document.getElementById('langToggle').textContent = lang === 'ur' ? 'English' : 'اردو';
    render();
  }

  document.getElementById('langToggle').addEventListener('click', () => {
    lang = lang === 'ur' ? 'en' : 'ur';
    localStorage.setItem('iies-lang', lang);
    applyLang();
  });

  function populateClassFilter(){
    const classes = [...new Set(books.map(b => b.class))];
    classFilter.innerHTML = `<option value="">${i18nText[lang].all}</option>` +
      classes.map(c => `<option value="${c}">${c}</option>`).join('');
  }

  function render(){
    const q = search.value.trim().toLowerCase();
    const cls = classFilter.value;

    if (books.length === 0){
      grid.innerHTML = '';
      bookCount.textContent = '';
      emptyState.style.display = 'block';
      document.getElementById('emptyTitle').textContent = i18nText[lang].emptyTitle;
      document.getElementById('emptySub').textContent = i18nText[lang].emptySub;
      return;
    }

    const filtered = books.filter(b => {
      const matchesSearch = !q || b.title.toLowerCase().includes(q);
      const matchesClass = !cls || b.class === cls;
      return matchesSearch && matchesClass;
    });

    grid.innerHTML = '';
    if (filtered.length === 0){
      emptyState.style.display = 'block';
      bookCount.textContent = '';
      document.getElementById('emptyTitle').textContent = i18nText[lang].noResultsTitle;
      document.getElementById('emptySub').textContent = i18nText[lang].noResultsSub;
      return;
    }
    emptyState.style.display = 'none';
    bookCount.textContent = filtered.length === 1 ? i18nText[lang].countOne : filtered.length + i18nText[lang].countMany;

    filtered.forEach(b => {
      const card = document.createElement('div');
      card.className = 'book-card';
      card.innerHTML = `
        <div class="book-cover"><div class="book-icon">${b.icon || '📘'}</div></div>
        <div class="book-body">
          <div class="book-class-tag">${b.class}</div>
          <div class="book-title">${b.title}</div>
          <div class="book-actions">
            <a class="book-action-btn read" href="${b.file}" target="_blank" rel="noopener">👁 ${i18nText[lang].read}</a>
            <a class="book-action-btn download" href="${b.file}" download>⬇ ${i18nText[lang].download}</a>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  search.addEventListener('input', render);
  classFilter.addEventListener('change', render);

  fetch('books.json')
    .then(res => res.json())
    .then(data => {
      books = data;
      populateClassFilter();
      applyLang();
    })
    .catch(err => {
      books = [];
      applyLang();
      console.error(err);
    });
</script>

</body>
</html>
