<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — The Iqra Islamic Educational System</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --navy:#0b2545; --gold:#c9a24b; --paper:#faf6ed; --ink:#1b1b1b;
    --line:#e2dccb; --mist:#6b6b6b;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:'Segoe UI', system-ui, sans-serif;
    background:var(--paper); color:var(--ink);
  }
  header{
    background:var(--navy); color:#fff; padding:16px 20px;
    display:flex; justify-content:space-between; align-items:center;
  }
  header h1{font-size:16px; margin:0;}
  header button{
    background:var(--gold); border:none; color:var(--navy);
    padding:8px 14px; border-radius:4px; font-weight:700; cursor:pointer;
  }
  #login-screen{
    max-width:360px; margin:80px auto; background:#fff; padding:30px;
    border-radius:8px; border:1px solid var(--line);
  }
  #login-screen h2{margin-top:0; color:var(--navy); text-align:center;}
  #login-screen input{
    width:100%; padding:10px; margin:8px 0; border:1px solid var(--line);
    border-radius:4px; font-size:14px;
  }
  #login-screen button{
    width:100%; padding:11px; background:var(--navy); color:#fff;
    border:none; border-radius:4px; font-weight:700; margin-top:10px; cursor:pointer;
  }
  #error-msg{color:#b02a2a; font-size:13px; text-align:center; margin-top:8px;}
  main{max-width:900px; margin:0 auto; padding:20px; display:none;}
  .tabs{display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap;}
  .tab-btn{
    padding:9px 16px; background:#fff; border:1px solid var(--line);
    border-radius:4px; cursor:pointer; font-size:13.5px; font-weight:600; color:var(--navy);
  }
  .tab-btn.active{background:var(--navy); color:#fff;}
  .panel{display:none; background:#fff; border:1px solid var(--line); border-radius:8px; padding:20px;}
  .panel.active{display:block;}
  .panel h3{margin-top:0; color:var(--navy);}
  form.add-form{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px; padding-bottom:18px; border-bottom:1px solid var(--line);}
  form.add-form input, form.add-form select{
    flex:1; min-width:110px; padding:8px; border:1px solid var(--line); border-radius:4px; font-size:13px;
  }
  form.add-form button{
    background:var(--gold); border:none; color:var(--navy); font-weight:700;
    padding:9px 16px; border-radius:4px; cursor:pointer;
  }
  table{width:100%; border-collapse:collapse; font-size:13.5px;}
  th{text-align:left; padding:8px 6px; border-bottom:2px solid var(--line); color:var(--gold); font-size:11px; text-transform:uppercase;}
  td{padding:8px 6px; border-bottom:1px solid var(--line);}
  .del-btn{background:none; border:none; color:#b02a2a; cursor:pointer; font-size:13px;}
  .paid-yes{color:#1a7a3c; font-weight:700;}
  .paid-no{color:#b02a2a; font-weight:700;}
  #loading{text-align:center; padding:40px; color:var(--mist);}
</style>
</head>
<body>

<header>
  <h1>IIES — Admin Panel</h1>
  <button id="logoutBtn" style="display:none;">Logout</button>
</header>

<div id="login-screen">
  <h2>Staff Login</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button id="loginBtn">Login</button>
  <div id="error-msg"></div>
</div>

<div id="loading" style="display:none;">Loading...</div>

<main id="main">
  <div class="tabs">
    <button class="tab-btn active" data-tab="students">Students</button>
    <button class="tab-btn" data-tab="fees">Fees</button>
    <button class="tab-btn" data-tab="results">Results</button>
  </div>

  <!-- STUDENTS -->
  <div class="panel active" id="students">
    <h3>Students</h3>
    <form class="add-form" id="studentForm">
      <input type="text" id="s_name" placeholder="Full Name" required>
      <input type="text" id="s_father" placeholder="Father's Name">
      <input type="text" id="s_class" placeholder="Class">
      <input type="date" id="s_dob" placeholder="Date of Birth">
      <input type="text" id="s_contact" placeholder="Contact Number">
      <button type="submit">+ Add Student</button>
    </form>
    <table>
      <thead><tr><th>Name</th><th>Father</th><th>Class</th><th>Contact</th><th></th></tr></thead>
      <tbody id="studentsTable"></tbody>
    </table>
  </div>

  <!-- FEES -->
  <div class="panel" id="fees">
    <h3>Fees</h3>
    <form class="add-form" id="feeForm">
      <select id="f_student" required></select>
      <input type="text" id="f_month" placeholder="Month (e.g. July)" required>
      <input type="number" id="f_year" placeholder="Year" required>
      <input type="number" id="f_amount" placeholder="Amount" required>
      <select id="f_paid"><option value="false">Unpaid</option><option value="true">Paid</option></select>
      <button type="submit">+ Add Fee Record</button>
    </form>
    <table>
      <thead><tr><th>Student</th><th>Month/Year</th><th>Amount</th><th>Status</th><th></th></tr></thead>
      <tbody id="feesTable"></tbody>
    </table>
  </div>

  <!-- RESULTS -->
  <div class="panel" id="results">
    <h3>Results</h3>
    <form class="add-form" id="resultForm">
      <select id="r_student" required></select>
      <input type="text" id="r_subject" placeholder="Subject" required>
      <input type="number" id="r_obtained" placeholder="Marks Obtained" required>
      <input type="number" id="r_total" placeholder="Total Marks" required>
      <input type="text" id="r_term" placeholder="Term (e.g. Mid-Term)">
      <input type="number" id="r_year" placeholder="Year">
      <button type="submit">+ Add Result</button>
    </form>
    <table>
      <thead><tr><th>Student</th><th>Subject</th><th>Marks</th><th>Term</th><th></th></tr></thead>
      <tbody id="resultsTable"></tbody>
    </table>
  </div>
</main>

<script>
  // ====== CONFIGURE YOUR SUPABASE DETAILS HERE ======
  const SUPABASE_URL = "https://pepqmgajrrjbjiufkzav.supabase.co";
  const SUPABASE_KEY = "sb_publishable_yAajPLVb6f5cEl5StbIPqw_3k9ElPxi";
  // ====================================================

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  let studentsCache = [];

  const loginScreen = document.getElementById('login-screen');
  const mainEl = document.getElementById('main');
  const logoutBtn = document.getElementById('logoutBtn');
  const loadingEl = document.getElementById('loading');

  document.getElementById('loginBtn').onclick = async () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      document.getElementById('error-msg').textContent = error.message;
    } else {
      await checkSession();
    }
  };

  logoutBtn.onclick = async () => {
    await sb.auth.signOut();
    location.reload();
  };

  async function checkSession() {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      loginScreen.style.display = 'none';
      logoutBtn.style.display = 'inline-block';
      mainEl.style.display = 'block';
      await loadAll();
    }
  }

  // Tabs
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(btn.dataset.tab).classList.add('active');
    };
  });

  async function loadAll() {
    await loadStudents();
    await loadFees();
    await loadResults();
  }

  // ---------- STUDENTS ----------
  async function loadStudents() {
    const { data, error } = await sb.from('students').select('*').order('created_at', { ascending: false });
    if (error) return console.error(error);
    studentsCache = data;
    const tbody = document.getElementById('studentsTable');
    tbody.innerHTML = '';
    const sel1 = document.getElementById('f_student');
    const sel2 = document.getElementById('r_student');
    sel1.innerHTML = ''; sel2.innerHTML = '';
    data.forEach(s => {
      tbody.innerHTML += `<tr>
        <td>${s.full_name}</td><td>${s.father_name || ''}</td><td>${s.class || ''}</td><td>${s.contact_number || ''}</td>
        <td><button class="del-btn" onclick="deleteRow('students','${s.id}')">Delete</button></td>
      </tr>`;
      const opt = `<option value="${s.id}">${s.full_name} (${s.class || ''})</option>`;
      sel1.innerHTML += opt;
      sel2.innerHTML += opt;
    });
  }

  document.getElementById('studentForm').onsubmit = async (e) => {
    e.preventDefault();
    const { error } = await sb.from('students').insert({
      full_name: document.getElementById('s_name').value,
      father_name: document.getElementById('s_father').value,
      class: document.getElementById('s_class').value,
      date_of_birth: document.getElementById('s_dob').value || null,
      contact_number: document.getElementById('s_contact').value,
    });
    if (error) return alert(error.message);
    e.target.reset();
    await loadStudents();
  };

  // ---------- FEES ----------
  async function loadFees() {
    const { data, error } = await sb.from('fees').select('*, students(full_name)').order('created_at', { ascending: false });
    if (error) return console.error(error);
    const tbody = document.getElementById('feesTable');
    tbody.innerHTML = '';
    data.forEach(f => {
      tbody.innerHTML += `<tr>
        <td>${f.students ? f.students.full_name : ''}</td>
        <td>${f.month} ${f.year}</td>
        <td>Rs. ${f.amount}</td>
        <td class="${f.paid ? 'paid-yes' : 'paid-no'}">${f.paid ? 'Paid' : 'Unpaid'}</td>
        <td><button class="del-btn" onclick="deleteRow('fees','${f.id}')">Delete</button></td>
      </tr>`;
    });
  }

  document.getElementById('feeForm').onsubmit = async (e) => {
    e.preventDefault();
    const { error } = await sb.from('fees').insert({
      student_id: document.getElementById('f_student').value,
      month: document.getElementById('f_month').value,
      year: parseInt(document.getElementById('f_year').value),
      amount: parseFloat(document.getElementById('f_amount').value),
      paid: document.getElementById('f_paid').value === 'true',
    });
    if (error) return alert(error.message);
    e.target.reset();
    await loadFees();
  };

  // ---------- RESULTS ----------
  async function loadResults() {
    const { data, error } = await sb.from('results').select('*, students(full_name)').order('created_at', { ascending: false });
    if (error) return console.error(error);
    const tbody = document.getElementById('resultsTable');
    tbody.innerHTML = '';
    data.forEach(r => {
      tbody.innerHTML += `<tr>
        <td>${r.students ? r.students.full_name : ''}</td>
        <td>${r.subject}</td>
        <td>${r.marks_obtained} / ${r.total_marks}</td>
        <td>${r.term || ''} ${r.year || ''}</td>
        <td><button class="del-btn" onclick="deleteRow('results','${r.id}')">Delete</button></td>
      </tr>`;
    });
  }

  document.getElementById('resultForm').onsubmit = async (e) => {
    e.preventDefault();
    const { error } = await sb.from('results').insert({
      student_id: document.getElementById('r_student').value,
      subject: document.getElementById('r_subject').value,
      marks_obtained: parseFloat(document.getElementById('r_obtained').value),
      total_marks: parseFloat(document.getElementById('r_total').value),
      term: document.getElementById('r_term').value,
      year: parseInt(document.getElementById('r_year').value) || null,
    });
    if (error) return alert(error.message);
    e.target.reset();
    await loadResults();
  };

  // ---------- DELETE ----------
  window.deleteRow = async (table, id) => {
    if (!confirm('Delete this record?')) return;
    const { error } = await sb.from(table).delete().eq('id', id);
    if (error) return alert(error.message);
    await loadAll();
  };

  checkSession();
</script>

</body>
</html>
